name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run build

      - name: Lint (biome)
        run: npm run lint

      - name: Lint (markdown)
        run: npm run lint:md

      - name: Test
        run: npm test
